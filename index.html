<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Joppolo — Sales Strategy & Consulting</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0D1B2A;
    --navy-mid: #142234;
    --gold: #B8973A;
    --gold-lt: #D4B060;
    --cream: #F8F5EF;
    --stone: #9CA3AF;
    --ink: #2C2C2C;
    --bg: #FAFAF8;
    --light: #F3F1EC;
    --nav-h: 60px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    overflow-x: hidden;
    width: 100%;
  }

  nav {
    position: sticky;
    top: 0;
    z-index: 200;
    height: var(--nav-h);
    background: rgba(13,27,42,0.98);
    border-bottom: 1px solid rgba(184,151,58,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 1.5rem;
  }

  .nav-brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 400;
    letter-spacing: 0.14em;
    color: var(--cream);
    text-decoration: none;
    text-transform: uppercase;
  }

  .nav-brand .j { color: var(--gold); }

  @media (min-width: 768px) {
    nav {
      padding: 0 4rem;
      justify-content: flex-start;
    }
    .nav-brand { font-size: 1.5rem; }
  }

  /* HERO */
  #hero {
    background: var(--navy);
    position: relative;
    overflow: hidden;
    padding: 3.5rem 1.5rem 4rem;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(184,151,58,0.06) 0%, transparent 60%);
    pointer-events: none;
  }

  .hero-big-j {
    position: absolute;
    right: -2vw;
    bottom: -8%;
    font-family: 'Cormorant Garamond', serif;
    font-size: 55vw;
    font-weight: 300;
    color: rgba(184,151,58,0.04);
    line-height: 1;
    user-select: none;
    pointer-events: none;
  }

  .hero-photo {
    width: 200px;
    height: 267px;
    position: relative;
    z-index: 2;
    margin-bottom: 2.5rem;
    flex-shrink: 0;
  }

  .hero-photo::before {
    content: '';
    position: absolute;
    top: -10px;
    left: -10px;
    right: 10px;
    bottom: 10px;
    border: 1px solid rgba(184,151,58,0.5);
    z-index: 0;
  }

  .hero-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
    position: relative;
    z-index: 1;
    filter: grayscale(15%);
  }

  .hero-content {
    position: relative;
    z-index: 2;
    text-align: center;
    width: 100%;
  }

  .hero-tag {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    font-size: 0.6rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1rem;
  }

  .hero-tag::before {
    content: '';
    width: 22px;
    height: 1px;
    background: var(--gold);
  }

  .hero-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.6rem, 11vw, 4.5rem);
    font-weight: 300;
    color: var(--cream);
    line-height: 1.05;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 1.1rem;
  }

  .hero-name em {
    font-style: italic;
    color: var(--gold);
    display: block;
    font-size: 0.85em;
  }

  .hero-desc {
    font-size: 0.9rem;
    font-weight: 300;
    line-height: 1.8;
    color: var(--stone);
    margin-bottom: 2rem;
    max-width: 340px;
    margin-left: auto;
    margin-right: auto;
  }

  @media (min-width: 768px) {
    #hero {
      flex-direction: row;
      align-items: center;
      padding: 0;
      min-height: 100vh;
    }

    .hero-photo { display: none; }

    .hero-content {
      text-align: left;
      padding: 10rem 4rem 8rem 8rem;
      flex: 1;
    }

    .hero-desc {
      margin-left: 0;
      margin-right: 0;
    }

    .hero-right-desktop {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8rem 8rem 8rem 2rem;
      position: relative;
      z-index: 2;
    }

    .profile-frame-desktop {
      position: relative;
      width: min(320px, 28vw);
      aspect-ratio: 3/4;
    }

    .profile-frame-desktop::before {
      content: '';
      position: absolute;
      top: -16px;
      left: -16px;
      width: 100%;
      height: 100%;
      border: 1px solid rgba(184,151,58,0.5);
      z-index: 0;
    }

    .profile-frame-desktop::after {
      content: '';
      position: absolute;
      bottom: -24px;
      right: -24px;
      width: 60%;
      height: 40%;
      background: rgba(184,151,58,0.1);
      z-index: 0;
    }
